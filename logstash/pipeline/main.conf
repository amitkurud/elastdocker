input {
    beats {
        port => 5044
    }
    udp {
        port => "${LOGSTASH_UDP_PORT}"
        type => syslog
        codec => json
    }
    tcp {
       port => "${LOGSTASH_TCP_PORT}"
       type => syslog
       codec => json_lines
    }
    http {
       port => "${LOGSTASH_HTTP_PORT}"
       codec => "json"
    }
}

filter {

}

output {
    elasticsearch {
        hosts => "${ELASTICSEARCH_HOST_PORT}"
        user => "${ELASTIC_USERNAME}"
        password => "${ELASTIC_PASSWORD}"
    }
}
